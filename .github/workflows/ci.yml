name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go-version }} on Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.21.x"
          - "stable"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify formatting
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD^"
          fi

          mapfile -t changed_go_files < <(
            git diff --name-only --diff-filter=ACMRT "$BASE_SHA" HEAD -- '*.go'
          )
          if [ "${#changed_go_files[@]}" -eq 0 ]; then
            exit 0
          fi

          unformatted="$(gofmt -l "${changed_go_files[@]}")"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Run gonmap tests
        working-directory: lib/gonmap
        run: |
          go vet .
          go test .

      - name: Run embedded Nuclei regression tests
        working-directory: lib/nuclei
        run: |
          go vet ./pkg/templates ./pkg/catalog/loader ./pkg/protocols/common/automaticscan ./pkg/protocols/common/protocolstate ./pkg/js/libs/mysql
          go test ./pkg/templates ./pkg/catalog/loader ./pkg/protocols/common/automaticscan ./pkg/protocols/common/protocolstate ./pkg/js/libs/mysql

      - name: Run concurrency race tests
        if: matrix.go-version == 'stable'
        shell: bash
        run: |
          go test -race ./common
          (
            cd lib/gonmap
            go test -race .
          )
          (
            cd lib/nuclei
            go test -race ./pkg/templates ./pkg/catalog/loader ./pkg/protocols/common/automaticscan ./pkg/protocols/common/protocolstate ./pkg/js/libs/mysql
          )

      - name: Build packages
        run: go build ./...
